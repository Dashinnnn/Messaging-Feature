<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">    <title>Chat app</title>
</head>
<body>
    <h1 class="title">Pigsy</h1>
    <div class="main">
        <!--Name of chatter-->
        <div class="name">
            <span><i class="fa-solid fa-user"></i></span>
            <input 
             type="text" 
             id="name-input" 
             class="name-input" 
             value="anonymous" 
             maxlength="20"
            >
        </div>
        <ul class="message-container" id="message-container">
            <div class="notice-message">
                <p>Protect your information at all times, this is a public chat.</p>
            </div>
        </ul>
        <!--Messaging form and button-->
        <form class="message-form" id="message-form">
            <input type="text" name="message" id="message-input" class="message-input">
            <div class="divider"></div>
            <button type="submit" class="send-button">Send <span><i class="fa-solid fa-paper-plane"></i></span></button>
        </form>
    </div>
    <!--Total clients counter-->
    <h3 class="clients-total" id="clients-total">Total clients: 2</h3>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment-with-locales.min.js" integrity="sha512-4F1cxYdMiAW98oomSLaygEwmCnIP38pb4Kx70yQYqRwLVCs3DbRumfBq82T08g/4LJ/smbFGFpmeFlQgoDccgg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="main.js"></script>
</body>
</html>
